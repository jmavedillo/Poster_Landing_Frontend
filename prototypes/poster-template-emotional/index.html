<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emotional Poster Template Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="poster-template" aria-label="Music poster preview">
      <article
        class="poster"
        style="--photo-url: url('https://images.unsplash.com/photo-1516589091380-5d8e87df6999?auto=format&fit=crop&w=1200&q=80');"
      >
        <img
          class="poster__photo"
          src="https://images.unsplash.com/photo-1516589091380-5d8e87df6999?auto=format&fit=crop&w=1200&q=80"
          alt="Couple portrait"
        />

        <div class="poster__gradient" aria-hidden="true"></div>

        <header class="poster__wave-area" aria-hidden="true">
          <svg
            class="poster__waveform"
            viewBox="0 0 212 40"
            role="presentation"
            focusable="false"
          >
            <rect x="1" y="13" width="4" height="14" rx="2"></rect>
            <rect x="10" y="8" width="4" height="24" rx="2"></rect>
            <rect x="19" y="11" width="4" height="18" rx="2"></rect>
            <rect x="28" y="5" width="4" height="30" rx="2"></rect>
            <rect x="37" y="10" width="4" height="20" rx="2"></rect>
            <rect x="46" y="3" width="4" height="34" rx="2"></rect>
            <rect x="55" y="8" width="4" height="24" rx="2"></rect>
            <rect x="64" y="14" width="4" height="12" rx="2"></rect>
            <rect x="73" y="6" width="4" height="28" rx="2"></rect>
            <rect x="82" y="11" width="4" height="18" rx="2"></rect>
            <rect x="91" y="16" width="4" height="8" rx="2"></rect>
            <rect x="100" y="1" width="4" height="38" rx="2"></rect>
            <rect x="109" y="14" width="4" height="12" rx="2"></rect>
            <rect x="118" y="9" width="4" height="22" rx="2"></rect>
            <rect x="127" y="3" width="4" height="34" rx="2"></rect>
            <rect x="136" y="11" width="4" height="18" rx="2"></rect>
            <rect x="145" y="6" width="4" height="28" rx="2"></rect>
            <rect x="154" y="13" width="4" height="14" rx="2"></rect>
            <rect x="163" y="8" width="4" height="24" rx="2"></rect>
            <rect x="172" y="5" width="4" height="30" rx="2"></rect>
            <rect x="181" y="12" width="4" height="16" rx="2"></rect>
            <rect x="190" y="9" width="4" height="22" rx="2"></rect>
            <rect x="199" y="14" width="4" height="12" rx="2"></rect>
            <rect x="208" y="16" width="3" height="8" rx="1.5"></rect>
          </svg>
        </header>

        <section class="poster__bottom" aria-label="Track info">
          <div class="poster__text-row">
            <div class="poster__track">
              <h1 class="poster__title">I Wanna Be Yours</h1>
              <p class="poster__artist">Arctic Monkeys</p>
            </div>
            <button class="poster__like" type="button" aria-label="Like track">♡</button>
          </div>

          <div class="poster__progress" aria-hidden="true">
            <div class="poster__progress-fill"></div>
          </div>

          <div class="poster__times" aria-hidden="true">
            <span>1:42</span>
            <span>3:03</span>
          </div>

          <div class="poster__controls" aria-hidden="true">
            <button class="control control--small" type="button" aria-label="Shuffle">⤨</button>
            <button class="control control--small" type="button" aria-label="Previous">⏮</button>
            <button class="control control--play" type="button" aria-label="Play">
              <svg class="control__play-icon" viewBox="0 0 24 24" role="presentation" focusable="false">
                <polygon points="8,6 8,18 18,12"></polygon>
              </svg>
            </button>
            <button class="control control--small" type="button" aria-label="Next">⏭</button>
            <button class="control control--small" type="button" aria-label="Repeat">↻</button>
          </div>
        </section>
      </article>
    </main>
  </body>
</html>
